name: mac-avro-build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest

    env:
      AVRO_INSTALL: ${{ github.workspace }}/cbuild/install
      OUTPUT_FILE: avrokdb-mac.tgz
      QHOME: ${{ github.workspace }}/qhome

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install avro-cpp
        run: |
          brew install avro-cpp fmt
          mkdir -p "${{ env.AVRO_INSTALL }}"
          cp -r /opt/homebrew/Cellar/boost/1.90.0_1/* "${{ env.AVRO_INSTALL }}"
          cp -r /opt/homebrew/Cellar/avro-cpp/1.12.1/* "${{ env.AVRO_INSTALL }}"
          cp -r /opt/homebrew/Cellar/fmt/12.1.0/* "${{ env.AVRO_INSTALL }}"

      - name: Build
        run: |
          mkdir cmake && cd cmake && cmake .. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_CXX_STANDARD=17 -DCMAKE_BUILD_TYPE=Release && cmake --build . --target install && cd .. && tar  -zcvf "$OUTPUT_FILE" -C cmake/avrokdb .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: avrokdb-mac
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml
