name: win-avro-build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    env:
      AVRO_INSTALL: ${{ github.workspace }}\cbuild\install
      OUTPUT_FILE: avrokdb-win.zip
      QHOME: ${{ github.workspace }}\qhome

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore cached avro lib
        if: steps.cache-avro.outputs.cache-hit != 'true'
        id: cache-avro
        uses: actions/cache@v5
        with:
          path: |
            cbuild\install
          key: ${{ runner.os }}-avro-1.11.2
          restore-keys: |
            ${{ runner.os }}-avro-1.11.2

      - name: Build avro lib
        if: steps.cache-avro.outputs.cache-hit != 'true'
        run : |
          mkdir -p cbuild\install
          cd cbuild
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout refs/tags/2026.03.18 --
          .\bootstrap-vcpkg.bat
          .\vcpkg install boost-iostreams:x64-windows boost-filesystem:x64-windows boost-program-options:x64-windows snappy:x64-windows
          .\vcpkg install avro-cpp:x64-windows
          cd installed
          cd x64-windows
          cp -r * "${{ env.AVRO_INSTALL}}"
          cd ..\..\..\..

      - name: Build
        run: |
          mkdir "${{ env.QHOME }}"
          mkdir cmake
          cd cmake
          cmake -G "Visual Studio 17 2022" -DCMAKE_CXX_STANDARD=17 ..
          cmake --build . --config Release
          cmake --build . --config Release --target install
          cd ..
          7z a -tzip -r "${{ env.OUTPUT_FILE }}" .\cmake\avrokdb\*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: avroksb-win
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml
