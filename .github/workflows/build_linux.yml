name: linux-avro-build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8

    env:
      AVRO_INSTALL: ${{ github.workspace }}/cbuild/install
      OUTPUT_FILE: avrokdb-linux.tgz
      QHOME: ${{ github.workspace }}/q

    steps:
      - name: Install build tools
        run: |
          yum -y install \
            git \
            gcc \
            gcc-c++ \
            make \
            cmake \
            wget \
            tar \
            gzip \
            snappy \
            boost-devel \
            boost-filesystem \
            boost-iostreams \
            boost-program-options

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get avro
        run: |
          mkdir -p cbuild/install &&
          cd cbuild &&
          git clone https://github.com/apache/avro.git &&
          cd avro &&
          git checkout refs/tags/release-1.11.2 -- &&
          cd lang/c++ &&
          mkdir build &&
          cd build &&
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_CXX_STANDARD=11 -DCMAKE_INSTALL_PREFIX=${{ env.AVRO_INSTALL }} .. &&
          cmake --build . --config Release &&
          cmake --build . --config Release --target install &&
          cd ../../../..

      - name: Build 
        run: |
          mkdir cmake && cd cmake && cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_CXX_STANDARD=11 -DAVRO_INSTALL=${{ env.AVRO_INSTALL }} && make install && cd .. && tar  -zcvf "$OUTPUT_FILE" -C cmake/avrokdb .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kdbavro-linux
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml
